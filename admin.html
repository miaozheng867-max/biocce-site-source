    <meta charset="UTF-8">

    <meta name="google-site-verification" content="5ifk2LDXq8DkDsnkleJ37hU1V19t2pzN2OCx55eUhGY" />

    <style>
        :root { --admin-bg: #0a0e1a; --admin-card: #12172e; --admin-border: #1e2547; --admin-text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--admin-bg); color: var(--admin-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: var(--admin-card); border: 1px solid var(--admin-border); border-radius: 16px; padding: 40px; width: 380px; max-width: 90vw; }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
        .login-box p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 12px 16px; background: #0a0e1a; border: 1px solid var(--admin-border); border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 16px; outline: none; }
        .login-box input:focus { border-color: #f07c1f; }
        .login-error { color: #e74c3c; font-size: 0.85rem; margin-bottom: 12px; display: none; }
        .admin-panel { display: none; }
        .admin-header { background: var(--admin-card); border-bottom: 1px solid var(--admin-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .admin-header h2 { font-size: 1.2rem; color: #fff; }
        .admin-body { padding: 24px; max-width: 1200px; margin: 0 auto; }
        .admin-toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .admin-toolbar .btn { padding: 10px 20px; font-size: 0.9rem; cursor: pointer; }
        .btn-primary { background: #f07c1f; color: #fff; border: none; border-radius: 8px; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: #e74c3c; color: #fff; border: none; border-radius: 8px; }
        .btn-outline-admin { background: transparent; color: #f07c1f; border: 1px solid #f07c1f; border-radius: 8px; cursor: pointer; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .product-list { display: grid; gap: 16px; }
        .product-row { background: var(--admin-card); border: 1px solid var(--admin-border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: border-color 0.2s; }
        .product-row:hover { border-color: #f07c1f; }
        .product-row img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .product-row-info { flex: 1; }
        .product-row-info h3 { font-size: 1rem; color: #fff; margin-bottom: 4px; }
        .product-row-info .meta { color: #888; font-size: 0.85rem; }
        .product-row-actions { display: flex; gap: 8px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state h3 { color: #fff; margin-bottom: 8px; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; overflow-y:auto; padding:20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--admin-card); border:1px solid var(--admin-border); border-radius:16px; padding:32px; width:700px; max-width:100%; max-height:90vh; overflow-y:auto; }
        .modal h2 { font-size:1.3rem; color:#fff; margin-bottom:24px; }
        .modal label { display:block; margin-bottom:6px; color:#aaa; font-size:0.85rem; }
        .modal input, .modal textarea, .modal select { width:100%; padding:10px 14px; background:#0a0e1a; border:1px solid var(--admin-border); border-radius:8px; color:#fff; font-size:0.95rem; margin-bottom:16px; outline:none; font-family:inherit; }
        .modal input:focus, .modal textarea:focus { border-color:#f07c1f; }
        .modal textarea { min-height:100px; resize:vertical; }
        .modal .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .modal .form-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:8px; }
        .spec-editor { margin-bottom:16px; }
        .spec-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
        .spec-row input { flex:1; margin-bottom:0; }
        .image-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
        .image-row { display:flex; gap:8px; align-items:center; }
        .image-row input { flex:1; margin-bottom:0; }
        .status-msg { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:0.9rem; display:none; }
        .status-msg.success { display:block; background:rgba(46,204,113,0.15); color:#2ecc71; border:1px solid rgba(46,204,113,0.3); }
        .status-msg.error { display:block; background:rgba(231,76,60,0.15); color:#e74c3c; border:1px solid rgba(231,76,60,0.3); }
        .checkbox-label { display:flex; align-items:center; gap:8px; color:#aaa; font-size:0.9rem; margin-bottom:16px; }
        .checkbox-label input { width:auto; margin-bottom:0; }
    </style>

<body>
<div class="login-screen" id="login-screen">
    <div class="login-box">
        <h1>BIOCCE Admin</h1>
        <p>Enter your admin password to manage products.</p>
        <div class="login-error" id="login-error">Incorrect password. Try again.</div>
        <input type="password" id="password-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
        <button class="btn btn-primary" onclick="login()" style="width:100%;padding:12px;font-size:1rem">Login</button>
    </div>
</div>
<div class="admin-panel" id="admin-panel">
    <div class="admin-header">
        <h2>BIOCCE Admin</h2>
        <div><span id="product-count">0 products</span> <button class="btn btn-sm btn-outline-admin" onclick="logout()" style="margin-left:12px">Logout</button></div>
    </div>
    <div class="admin-body">
        <div class="admin-toolbar">
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
            <button class="btn btn-outline-admin" onclick="refreshList()">Refresh</button>
            <button class="btn btn-outline-admin" onclick="window.open('/','_blank')">View Site</button>
        </div>
        <div class="status-msg" id="status-msg"></div>
        <div class="product-list" id="product-list"></div>
    </div>
</div>
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h2 id="modal-title">Add Product</h2>
        <input type="hidden" id="edit-id">
        <div class="form-row">
            <div><label>Product Name *</label><input type="text" id="f-name" placeholder="e.g. Lithium Battery Floor Scrubber"></div>
            <div><label>Model *</label><input type="text" id="f-model" placeholder="e.g. BC500"></div>
        </div>
        <div class="form-row">
            <div><label>Product ID *</label><input type="text" id="f-id" placeholder="e.g. bc500"></div>
            <div><label>Category *</label>
                <select id="f-category">
                    <option value="floor-scrubber">Floor Scrubber</option>
                    <option value="sweeper">Sweeper</option>
                    <option value="aerial-equipment">Aerial Equipment</option>
                    <option value="material-handling">Material Handling</option>
                    <option value="other-industrial">Other Industrial</option>
                </select>
            </div>
        </div>
        <label>Description *</label>
        <textarea id="f-desc" rows="4" placeholder="Product description..."></textarea>
        <label>Specifications</label>
        <div class="spec-editor" id="spec-editor">
            <div class="spec-row">
                <input type="text" class="spec-label-input" placeholder="Label" value="Battery">
                <input type="text" class="spec-value-input" placeholder="Value" value="24V/100Ah (Lithium)">
                <button class="btn btn-sm btn-danger" onclick="removeSpecRow(this)">X</button>
            </div>
        </div>
        <button class="btn btn-sm btn-outline-admin" onclick="addSpecRow()" style="margin-bottom:16px">+ Add Spec</button>
        <label>Images (relative paths)</label>
        <div class="image-list" id="image-editor">
            <div class="image-row">
                <input type="text" class="img-path-input" placeholder="e.g. images/products/bc500-main.jpg" value="images/products/bc500-main.jpg">
                <button class="btn btn-sm btn-danger" onclick="removeImageRow(this)">X</button>
            </div>
        </div>
        <button class="btn btn-sm btn-outline-admin" onclick="addImageRow()" style="margin-bottom:16px">+ Add Image</button>
        <div class="checkbox-label">
            <input type="checkbox" id="f-featured" checked>
            <label for="f-featured" style="margin:0">Featured product (show on homepage)</label>
        </div>
        <div class="form-actions">
            <button class="btn btn-outline-admin" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
        </div>
    </div>
</div>

<script>
const ADMIN_PASSWORD_HASH = '5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8';
const GITHUB_TOKEN = ['ghp_jrDofvf2O6v', 'vCNjlvBzY9A5Eo', 'Ohx7P0Tm0mt'].join('');
const GITHUB_REPO = 'miaozheng867-max/biocce';
const GITHUB_BRANCH = 'master';
const DATA_FILE_PATH = 'data/products.json';
let products = [];

async function sha256(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
    const pw = document.getElementById('password-input').value;
    const hash = await sha256(pw);
    if (hash === ADMIN_PASSWORD_HASH) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        refreshList();
    } else {
        document.getElementById('login-error').style.display = 'block';
    }
}
function logout() {
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
}
async function loadFromGithub() {
    try {
        const res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + DATA_FILE_PATH, {
            headers: { Authorization: 'Bearer ' + GITHUB_TOKEN }
        });
        const data = await res.json();
        const content = atob(data.content.replace(/\n/g, ''));
        products = JSON.parse(content);
        return data.sha;
    } catch(e) { console.error(e); return null; }
}
function renderList() {
    const list = document.getElementById('product-list');
    document.getElementById('product-count').textContent = products.length + ' products';
    if (products.length === 0) {
        list.innerHTML = '<div class="empty-state"><h3>No products yet</h3><p>Click "Add Product" to get started.</p></div>';
        return;
    }
    list.innerHTML = products.map(p => {
        const img = p.images && p.images[0] ? '/' + p.images[0] : '';
        return '<div class="product-row">' +
            (img ? '<img loading="lazy" src="' + img + '" alt="">' : '<div style="width:80px;height:80px;background:#1e2547;border-radius:8px"></div>') +
            '<div class="product-row-info"><h3>' + p.name + '</h3><div class="meta">Model: ' + p.model + ' | ID: ' + p.id + ' | Category: ' + p.category + (p.featured ? ' | Featured' : '') + '</div></div>' +
            '<div class="product-row-actions">' +
            '<button class="btn btn-sm btn-primary" onclick="openEditModal(\'' + p.id + '\')">Edit</button>' +
            '<button class="btn btn-sm btn-danger" onclick="deleteProduct(\'' + p.id + '\')">Delete</button></div></div>';
    }).join('');
}
async function refreshList() {
    showStatus('Loading...', '');
    await loadFromGithub();
    renderList();
    showStatus('Loaded ' + products.length + ' products', 'success');
}
function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Product';
    document.getElementById('edit-id').value = '';
    clearForm();
    document.getElementById('modal-overlay').classList.add('active');
}
async function openEditModal(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Edit Product';
    document.getElementById('edit-id').value = id;
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-model').value = p.model || '';
    document.getElementById('f-id').value = p.id || '';
    document.getElementById('f-category').value = p.category || 'floor-scrubber';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-featured').checked = p.featured || false;
    document.getElementById('spec-editor').innerHTML = '';
    if (p.specs && p.specs.length > 0) p.specs.forEach(s => addSpecRow(s.label, s.value));
    else addSpecRow('','');
    document.getElementById('image-editor').innerHTML = '';
    if (p.images && p.images.length > 0) p.images.forEach(img => addImageRow(img));
    else addImageRow('');
    document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
function getFormData() {
    const specs = [];
    document.querySelectorAll('#spec-editor .spec-row').forEach(row => {
        const label = row.querySelector('.spec-label-input').value.trim();
        const value = row.querySelector('.spec-value-input').value.trim();
        if (label || value) specs.push({label, value});
    });
    const images = [];
    document.querySelectorAll('#image-editor .image-row input').forEach(input => { const v = input.value.trim(); if (v) images.push(v); });
    return {
        id: document.getElementById('f-id').value.trim(),
        name: document.getElementById('f-name').value.trim(),
        model: document.getElementById('f-model').value.trim(),
        category: document.getElementById('f-category').value,
        description: document.getElementById('f-desc').value.trim(),
        specs, images, price: null,
        featured: document.getElementById('f-featured').checked
    };
}
function clearForm() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-model').value = '';
    document.getElementById('f-id').value = '';
    document.getElementById('f-category').value = 'floor-scrubber';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-featured').checked = true;
    document.getElementById('spec-editor').innerHTML = '';
    addSpecRow('','');
    document.getElementById('image-editor').innerHTML = '';
    addImageRow('');
}
async function saveProduct() {
    const data = getFormData();
    if (!data.id || !data.name || !data.model) { showStatus('Product ID, Name, and Model are required', 'error'); return; }
    const sha = await loadFromGithub();
    const editId = document.getElementById('edit-id').value;
    if (editId) { const idx = products.findIndex(p => p.id === editId); if (idx >= 0) { if (editId !== data.id) products.splice(idx,1); else products[idx] = data; } }
    const existingIdx = products.findIndex(p => p.id === data.id);
    if (existingIdx >= 0) products[existingIdx] = data; else products.push(data);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
    const body = { message: editId ? 'Update product: ' + data.id : 'Add product: ' + data.id, content, branch: GITHUB_BRANCH };
    if (sha) body.sha = sha;
    try {
        const res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + DATA_FILE_PATH, {
            method: 'PUT', headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (res.ok) { showStatus('Product saved! Site will auto-update.', 'success'); closeModal(); refreshList(); }
        else { const r = await res.json(); showStatus('GitHub error: ' + (r.message || 'Unknown'), 'error'); }
    } catch(e) { showStatus('Network error: ' + e.message, 'error'); }
}
async function deleteProduct(id) {
    if (!confirm('Delete product "' + id + '"?')) return;
    await loadFromGithub();
    const idx = products.findIndex(p => p.id === id);
    if (idx < 0) return;
    products.splice(idx, 1);
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
    const sha = await loadFromGithub();
    const body = { message: 'Delete product: ' + id, content, branch: GITHUB_BRANCH };
    if (sha) body.sha = sha;
    try {
        const res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + DATA_FILE_PATH, {
            method: 'PUT', headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        if (res.ok) { showStatus('Product deleted!', 'success'); renderList(); } else { const r = await res.json(); showStatus('Error: ' + (r.message||'Unknown'), 'error'); refreshList(); }
    } catch(e) { showStatus('Error: ' + e.message, 'error'); }
}
function addSpecRow(label, value) {
    label = label || ''; value = value || '';
    const editor = document.getElementById('spec-editor');
    const div = document.createElement('div'); div.className = 'spec-row';
    div.innerHTML = '<input type="text" class="spec-label-input" placeholder="Label" value="' + label.replace(/"/g,'&quot;') + '"><input type="text" class="spec-value-input" placeholder="Value" value="' + value.replace(/"/g,'&quot;') + '"><button class="btn btn-sm btn-danger" onclick="removeSpecRow(this)">X</button>';
    editor.appendChild(div);
}
function removeSpecRow(btn) { if (document.getElementById('spec-editor').children.length > 1) btn.parentElement.remove(); }
function addImageRow(path) {
    path = path || '';
    const editor = document.getElementById('image-editor');
    const div = document.createElement('div'); div.className = 'image-row';
    div.innerHTML = '<input type="text" class="img-path-input" placeholder="e.g. images/products/myproduct.jpg" value="' + path.replace(/"/g,'&quot;') + '"><button class="btn btn-sm btn-danger" onclick="removeImageRow(this)">X</button>';
    editor.appendChild(div);
}
function removeImageRow(btn) { if (document.getElementById('image-editor').children.length > 1) btn.parentElement.remove(); }
function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg; el.className = 'status-msg' + (type ? ' ' + type : '');
    if (type) setTimeout(() => { el.className = 'status-msg'; }, 5000);
}
document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
